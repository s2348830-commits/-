<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競車 - アーケードレース</title>
    
    <link rel="icon" href="data:,">

    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div id="marquee-container">
        <div id="marquee-text">
            <span>東京サーキット 1200m</span>
            <span>人気順: 1番(車A) ➔ 2番(車B) ➔ 3番(車C)</span>
            <span>低倍率順: 1.8x ➔ 3.5x ➔ 5.5x</span>
        </div>
    </div>

    <div id="game-container">
        <header>
            <div class="header-left">
                <div class="timer-box">残り <span id="time-left">10:00</span></div>
                <div class="venue-title">東京サーキット <span class="distance">1200m</span></div>
            </div>
            <div class="header-right">
                <span class="user-fp-display">🍀 所持: <span id="current-fp">----</span> FP</span>
            </div>
        </header>

        <div class="main-content">
            <div class="odds-table">
                <div class="table-header">
                    <div class="col-num">番号</div>
                    <div class="col-name">名前</div>
                    <div class="col-cond">調子</div>
                    <div class="col-pop">人気 / 単勝倍率</div>
                    <div class="col-win">単勝</div>
                    <div class="col-place">複勝</div>
                </div>
                <div class="table-row">
                    <div class="col-num bg-white">1</div>
                    <div class="col-name">レッドフェラーリ</div>
                    <div class="col-cond">↗</div>
                    <div class="col-pop">1 / 2.1</div>
                    <div class="col-win bet-btn" data-type="win" data-car="1">× 2.1</div>
                    <div class="col-place bet-btn" data-type="place" data-car="1">× 1.0~1.1</div>
                </div>
                <div class="table-row">
                    <div class="col-num bg-black">2</div>
                    <div class="col-name">ブルーポルシェ</div>
                    <div class="col-cond">➡</div>
                    <div class="col-pop">4 / 10.8</div>
                    <div class="col-win bet-btn" data-type="win" data-car="2">× 10.8</div>
                    <div class="col-place bet-btn" data-type="place" data-car="2">× 2.6~3.9</div>
                </div>
                </div>

            <div class="video-area" style="position: relative;">
                <video id="race-video" src="race_sample.mp4" muted playsinline style="width:100%; height:100%; object-fit:cover; display:none;"></video>
                
                <div id="video-placeholder" style="position:absolute; width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#222;">ベット受付中...</div>
                
                <div id="cutin-overlay" style="position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.8); color:yellow; display:none; align-items:center; justify-content:center; font-size:24px; font-weight:bold; text-align:center;">
                    ⚡ プレイヤー介入！<br>再計算中...
                </div>
            </div>

            <div class="side-menu">
                <button class="menu-btn active">単・複</button>
                <button class="menu-btn">馬連</button>
                <button class="menu-btn">馬単</button>
                <button class="menu-btn">ワイド</button>
                <button class="menu-btn">三連複</button>
                <button class="menu-btn">三連単</button>
                <button class="menu-btn">転がし</button>
            </div>
        </div>

        <div class="bottom-panel">
            <div class="bet-unit-control">
                <span>BET単位:</span>
                <select id="bet-unit">
                    <option value="10">10 FP</option>
                    <option value="100" selected>100 FP</option>
                    <option value="1000">1000 FP</option>
                </select>
            </div>
            <div class="bet-actions">
                <button id="undo-btn">🔙 1つ戻し</button>
                <button id="show-list-btn">📋 BET一覧</button>
            </div>
        </div>

        <div id="bet-modal-overlay" style="display: none;">
            <div class="bet-modal-content">
                <div class="bet-modal-header">
                    <h2>📋 BET一覧</h2>
                    <button id="close-modal-btn">×</button>
                </div>
                <div id="bet-modal-list">
                    </div>
                <div class="bet-modal-footer">
                    <span>合計BET:</span>
                    <span id="bet-modal-total">0 FP</span>
                </div>
            </div>
        </div>
</div> 
    <script type="module" src="/main.js"></script>
</body>
</html>
